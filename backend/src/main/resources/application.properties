spring.application.name=fixonaut-backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/fixonaut}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fixonaut_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fixonaut_dev_password}

fixonaut.jwt.secret=${FIXONAUT_JWT_SECRET:fixonaut-local-dev-secret-change-before-production-2026}
fixonaut.jwt.expiration-seconds=${FIXONAUT_JWT_EXPIRATION_SECONDS:900}

fixonaut.auth.refresh-token-cookie-name=refresh_token
fixonaut.auth.refresh-token-expiration-seconds=604800
fixonaut.auth.cookie-secure=${FIXONAUT_COOKIE_SECURE:false}
fixonaut.auth.cookie-same-site=${FIXONAUT_COOKIE_SAME_SITE:Lax}

fixonaut.cors.allowed-origins=${FIXONAUT_CORS_ALLOWED_ORIGINS:http://localhost:5173}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

info.app.name=Fixonaut Backend
info.app.description=Field-service management platform
info.app.version=0.0.1
info.app.environment=${SPRING_PROFILES_ACTIVE:local}

management.endpoints.web.exposure.include=health,info

management.endpoint.health.show-details=when_authorized

management.endpoint.health.probes.enabled=true

management.health.livenessstate.enabled=true

management.health.readinessstate.enabled=true

management.info.env.enabled=true