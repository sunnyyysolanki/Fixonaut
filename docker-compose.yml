services:
  postgres:
    image: postgres:16-alpine
    container_name: fixonaut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fixonaut}
      POSTGRES_USER: ${POSTGRES_USER:-fixonaut_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fixonaut_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - fixonaut-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fixonaut_app} -d ${POSTGRES_DB:-fixonaut}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles:
      - full
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fixonaut-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fixonaut}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-fixonaut_app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-fixonaut_dev_password}
      FIXONAUT_JWT_SECRET: ${FIXONAUT_JWT_SECRET}
      FIXONAUT_CORS_ALLOWED_ORIGINS: ${FIXONAUT_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail http://localhost:8080/actuator/health/readiness || exit 1"
        ]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  frontend:
    profiles:
      - full
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fixonaut-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  fixonaut-postgres-data: